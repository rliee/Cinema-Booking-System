<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
    
</head>
<body style="background-color: rgb(191, 251, 191);">
    <form action="" class="container form-control flex-column mt-5 px-5 pt-4" style="width: 500px; background-color: rgb(141, 227, 141); border-radius: 30px; border-color: rgb(102, 189, 102); border-width: 4px;">
        <h1 class="text-center"><b>Login</b></h1>
        <div class="form-group pt-3">
            <label for="" class="form-label"><b>Email Address</b></label>
            <input type="email" class="form-control" placeholder="Enter Email Address">
        </div>
        <div class="form-group pt-3">
            <label for="" class="form-label"><b>Password</b></label>
            <input type="password" class="form-control" placeholder="Enter Password">
        </div>
        <div class="input-group pt-3 justify-content-center">
            <button class="btn mb-2 btn-primary-emelang" style="border-radius: 10px; color: black;"><b>Submit</b></button>
        </div>
    </form>
</body>
</html>
