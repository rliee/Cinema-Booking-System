<html lang="en">
<head>

    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <style>
        .gallery-img {
            width: 100%;
            height: auto;
            transition: transform 0.2s;
        }
        .gallery-img:hover {
            transform: scale(1.05);

    </style>
</head>

                <a href="images/img-1.jpg" class="d-block mb-3 h-100">

            </div>
