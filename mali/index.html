<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5.0.2 Example</title>
    <!--Bootstrap CSS-->
    <link href="bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>
    <!-- <h1 class="text-center">Hello, Bootstrap 5.0.2!</h1> -->
    <!--Bootstrap JS and dependencies-->

    <form action="" class="container form-control flex-column mt-5" style="width: 500px; background-color: rgb(155, 148, 155);">
       <h1>Register</h1>
            <div class="form-group">
            <label for="" class="form-label">First name:</label>
            <input type="text" class="form-control">
        </div>
        <div class="form-group">
            <label for="" class="form-label">Last name:</label>
            <input type="text" class="form-control">
        </div>
        <div class="form-group">
            <label for="" class="form-label">Email:</label>
            <input type="email" class="form-control">
        </div>
        <div class="form-group ">
            <label for="" class="form-label">Password:</label>
            <input type="password" class="form-control">
            <p class="form-text mb-0">Your password must contain 8-16 characters.</p>
        </div>
        <div class="input-group justify-content-end">
            <button class="btn mb-2 btn-primary">Register</button>
        </div>
        
    </form>


    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
